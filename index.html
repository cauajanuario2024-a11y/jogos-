<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Jogo Épico | Oficial</title>
    <style>
        /* Estilo do Site */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117; /* Fundo escuro estilo GitHub */
            color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            background: #161b22;
            text-align: center;
            border-bottom: 2px solid #30363d;
        }

        .container {
            max-width: 800px;
            padding: 40px 20px;
            text-align: center;
        }

        .game-screen {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border: 4px solid #58a6ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.2);
        }

        .btn-download {
            background-color: #238636;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            font-size: 1.2rem;
            transition: 0.3s;
        }

        .btn-download:hover {
            background-color: #2ea043;
        }

        footer {
            margin-top: 50px;
            color: #8b949e;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>PROJETO: NOME DO SEU JOGO</h1>
    </header>

    <div class="container">
        <div class="game-screen">
            <p>🎮 [O Jogo aparecerá aqui em breve!] 🎮</p>
        </div>

        <h2>Sobre o Jogo</h2>
        <p>Este é o meu primeiro projeto hospedado no GitHub. Em breve, você poderá jogar uma aventura incrível diretamente aqui pelo navegador!</p>
        
        <br><br>
        
        <a href="https://github.com/SEU-USUARIO" class="btn-download" target="_blank">Ver Código no GitHub</a>
    </div>

    <footer>
        Criado por Você - 2026
    </footer>

</body>
</html>
